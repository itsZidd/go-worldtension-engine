name: WorldTension Daily Turn

on:
  schedule:
    # Runs automatically at 00:00 UTC every single day
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  update-tension-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run Data Engine
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # ACLED secrets removed here
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
        run: go run .

      # THE FINAL HANDSHAKE
      - name: Trigger Vercel Astro Build
        # This 'if' ensures we don't trigger a rebuild if the Go engine crashed
        if: success()
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: curl -X POST $VERCEL_DEPLOY_HOOK
